<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huddle — Support</title>
<link rel="icon" type="image/png" href="huddle.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060608;
  --bg-surface: #0B0B0F;
  --accent: #00F0FF;
  --accent-dim: rgba(0, 240, 255, 0.1);
  --accent-border: rgba(0, 240, 255, 0.25);
  --text: #FFFFFF;
  --text-secondary: #9494A1;
  --text-muted: #62626C;
  --border: rgba(255, 255, 255, 0.06);
  --border-hover: rgba(255, 255, 255, 0.12);
  --radius-lg: 24px;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; background: var(--bg); }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  line-height: 1.6; -webkit-font-smoothing: antialiased;
  min-height: 100vh; display: flex; flex-direction: column;
}
::selection { background: rgba(0, 240, 255, 0.2); color: var(--text); }
a { color: inherit; text-decoration: none; transition: all 0.2s var(--ease); }
button { font-family: inherit; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

/* ---------- Nav ---------- */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(6, 6, 8, 0.75);
  backdrop-filter: blur(20px) saturate(1.6);
  -webkit-backdrop-filter: blur(20px) saturate(1.6);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}
.nav-inner { height: 72px; display: flex; align-items: center; justify-content: space-between; }
.logo {
  font-family: Arial, Helvetica, sans-serif;
  font-weight: bold; font-size: 24px; letter-spacing: -0.03em; color: var(--text);
  display: flex; align-items: center;
}
.logo .dot { color: var(--accent); }
.nav-links { display: flex; align-items: center; gap: 32px; }
.nav-links a { font-size: 14px; color: var(--text-secondary); font-weight: 500; }
.nav-links a:hover { color: var(--text); }
.nav-right { display: flex; align-items: center; gap: 16px; }
.lang-toggle {
  display: flex; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
  border-radius: 999px; padding: 2px;
}
.lang-toggle button {
  border: 0; background: transparent; color: var(--text-secondary);
  font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 999px;
  cursor: pointer; transition: all 0.2s var(--ease);
}
.lang-toggle button.active { background: var(--text); color: var(--bg); }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-weight: 600; font-size: 14px; border-radius: 999px; cursor: pointer;
  transition: all 0.2s var(--ease); border: 0; white-space: nowrap;
}
.btn-primary { background: var(--text); color: var(--bg); padding: 12px 28px; }
.btn-primary:hover {
  background: var(--accent); transform: translateY(-2px);
  box-shadow: 0 12px 30px rgba(0, 240, 255, 0.25);
}
.btn-nav { padding: 8px 20px; font-size: 13px; }

/* ---------- Support center ---------- */
.support-center {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 140px 24px 80px; position: relative; text-align: center;
}
.support-center::before {
  content: ""; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 600px 400px at 50% 30%, rgba(0, 240, 255, 0.08), transparent 70%);
  pointer-events: none;
}
.support-card {
  position: relative; z-index: 1;
  background: linear-gradient(180deg, rgba(17,17,22,0.6) 0%, rgba(9,9,12,0.9) 100%);
  border: 1px solid var(--border); border-radius: 32px;
  padding: 80px 60px; max-width: 580px; width: 100%;
}
.support-card::before {
  content: ""; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 400px; height: 180px;
  background: radial-gradient(closest-side, rgba(0, 240, 255, 0.06), transparent);
  filter: blur(20px); pointer-events: none;
}
.support-icon {
  width: 64px; height: 64px; border-radius: 18px; margin: 0 auto 28px;
  background: var(--accent-dim); border: 1px solid var(--accent-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: var(--accent);
}
.support-card h1 {
  font-size: clamp(28px, 4vw, 38px); font-weight: 800;
  letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 14px;
}
.support-card .desc {
  font-size: 16px; color: var(--text-secondary); margin-bottom: 40px; line-height: 1.6;
}
.email-link {
  display: inline-flex; align-items: center; gap: 12px;
  background: var(--accent-dim); border: 1px solid var(--accent-border);
  border-radius: 999px; padding: 16px 32px;
  font-size: 17px; font-weight: 600; color: var(--accent);
  transition: all 0.25s var(--ease);
}
.email-link:hover {
  background: rgba(0, 240, 255, 0.18); border-color: rgba(0, 240, 255, 0.4);
  transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0, 240, 255, 0.15);
}
.email-link .arrow { font-size: 14px; opacity: 0.7; transition: transform 0.2s var(--ease); }
.email-link:hover .arrow { transform: translateX(4px); opacity: 1; }
.response-note {
  margin-top: 24px; font-size: 13px; color: var(--text-muted); font-weight: 500;
}

/* ---------- Footer ---------- */
footer { border-top: 1px solid var(--border); padding: 40px 0; background: #040406; }
.footer-inner {
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px;
  color: var(--text-muted); font-size: 14px;
}
.footer-links { display: flex; gap: 24px; }
.footer-links a { color: var(--text-secondary); font-size: 14px; font-weight: 500; }
.footer-links a:hover { color: var(--text); }

@media (max-width: 768px) {
  .nav-links { display: none; }
  .support-card { padding: 60px 28px; }
  .email-link { font-size: 15px; padding: 14px 24px; }
}
</style>
</head>
<body>

<nav>
  <div class="container nav-inner">
    <a href="index.html" class="logo">Huddle</a>
    <div class="nav-links">
      <a href="index.html#features" data-i18n="nav_features">Features</a>
      <a href="index.html#how" data-i18n="nav_how">How it works</a>
      <a href="#" data-i18n="nav_support">Support</a>
    </div>
    <div class="nav-right">
      <div class="lang-toggle" role="group" aria-label="Language">
        <button id="lang-en" class="active" onclick="setLang('en')">EN</button>
        <button id="lang-tr" onclick="setLang('tr')">TR</button>
      </div>
      <a href="index.html#contact" class="btn btn-primary btn-nav" data-i18n="nav_cta">Get early access</a>
    </div>
  </div>
</nav>

<main class="support-center">
  <div class="support-card">
    <div class="support-icon">✉</div>
    <h1 data-i18n="title">Need help?</h1>
    <p class="desc" data-i18n="desc">Drop us an email and we'll get back to you as soon as possible.</p>
    <a href="mailto:support@mucoai.com" class="email-link">
      support@mucoai.com
      <span class="arrow">→</span>
    </a>
    <p class="response-note" data-i18n="note">We typically respond within 24 hours.</p>
  </div>
</main>

<footer>
  <div class="container footer-inner">
    <a href="index.html" class="logo" style="font-size:18px">Huddle</a>
    <div class="footer-links">
      <a href="#" data-i18n="footer_support">Support</a>
      <a href="#" data-i18n="footer_privacy">Privacy</a>
      <a href="#" data-i18n="footer_terms">Terms</a>
    </div>
    <span data-i18n="footer">© 2026 Huddle. All rights reserved.</span>
  </div>
</footer>

<script>
const i18n = {
  en: {
    nav_features:"Features", nav_how:"How it works", nav_support:"Support", nav_cta:"Get early access",
    title:"Need help?",
    desc:"Drop us an email and we'll get back to you as soon as possible.",
    note:"We typically respond within 24 hours.",
    footer_support:"Support", footer_privacy:"Privacy", footer_terms:"Terms",
    footer:"© 2026 Huddle. All rights reserved."
  },
  tr: {
    nav_features:"Özellikler", nav_how:"Nasıl çalışır", nav_support:"Destek", nav_cta:"Erken erişim",
    title:"Yardıma mı ihtiyacınız var?",
    desc:"Bize bir e-posta gönderin, en kısa sürede size dönelim.",
    note:"Genellikle 24 saat içinde yanıt veriyoruz.",
    footer_support:"Destek", footer_privacy:"Gizlilik", footer_terms:"Şartlar",
    footer:"© 2026 Huddle. Tüm hakları saklıdır."
  }
};
let currentLang = 'en';
function setLang(lang){
  currentLang = lang;
  document.documentElement.lang = lang;
  document.getElementById('lang-en').classList.toggle('active', lang==='en');
  document.getElementById('lang-tr').classList.toggle('active', lang==='tr');
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.getAttribute('data-i18n');
    if(i18n[lang][k] !== undefined) el.textContent = i18n[lang][k];
  });
}
</script>
</body>
</html>
